<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Лабиринт: Выберись наружу! (GitHub Pages Ready)</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a2f2a 0%, #05201c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            padding: 12px;
        }

        .game-wrapper {
            width: 100%;
            max-width: 650px;
            margin: 0 auto;
        }

        .game-container {
            background: #1e3b36;
            border-radius: 48px;
            padding: 16px 14px 22px 14px;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.1);
        }

        .game-panel {
            background: #0f2c27;
            border-radius: 40px;
            padding: 14px;
            box-shadow: inset 0 0 6px #00000055, 0 8px 12px rgba(0,0,0,0.3);
        }

        .canvas-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            position: relative;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            display: block;
            border-radius: 28px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            background-color: #231f1b;
        }

        .stats-panel {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
            background: #08221e;
            border-radius: 60px;
            padding: 8px 16px;
            box-shadow: inset 0 1px 3px #2f6b60, 0 4px 8px black;
        }

        .record-box {
            background: #010d0b;
            border-radius: 40px;
            padding: 5px 16px;
            text-align: center;
            flex: 1;
            box-shadow: inset 0 0 2px #3f9e8b, 0 2px 5px black;
        }

        .record-label {
            font-size: 0.7rem;
            color: #9effcf;
            letter-spacing: 1px;
        }

        .record-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #f3ffb6;
            font-family: monospace;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 16px;
            margin-bottom: 16px;
            padding: 0 6px;
        }

        .timer-box, .status-box {
            background: #010d0b;
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: bold;
            text-shadow: 0 2px 2px black;
            box-shadow: inset 0 1px 2px #3f9e8b, 0 5px 8px black;
            flex: 1;
            min-width: 110px;
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .timer-box span, .status-box span {
            color: #9effcf;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .timer-value, .status-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #f3ffb6;
            font-family: monospace;
            line-height: 1;
        }

        button {
            background: #e6b422;
            border: none;
            font-size: 0.9rem;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 40px;
            font-family: inherit;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 4px 0 #8b5a2b;
            color: #2b2b1a;
            white-space: nowrap;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #8b5a2b;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }

        .dpad {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            background: #1c3e38;
            padding: 14px 18px;
            border-radius: 70px;
            box-shadow: inset 0 0 0 2px #2f655a, 0 8px 14px black;
        }

        .dpad-row {
            display: flex;
            justify-content: center;
            gap: 18px;
        }

        .arrow-btn {
            background: #4b3a2a;
            width: 75px;
            height: 75px;
            font-size: 2.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 55px;
            font-weight: bold;
            color: #f7e5b1;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 5px 0 #2c241a;
            font-family: monospace;
            touch-action: manipulation;
        }

        .arrow-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #2c241a;
        }

        @media (max-width: 550px) {
            .arrow-btn {
                width: 60px;
                height: 60px;
                font-size: 2rem;
            }
            .dpad {
                padding: 10px 14px;
                gap: 8px;
            }
            .dpad-row {
                gap: 14px;
            }
            .timer-value, .status-value {
                font-size: 1.2rem;
            }
            .record-value {
                font-size: 1rem;
            }
            button {
                font-size: 0.75rem;
                padding: 6px 14px;
            }
        }

        @media (max-width: 420px) {
            .arrow-btn {
                width: 52px;
                height: 52px;
                font-size: 1.7rem;
            }
            .dpad-row {
                gap: 10px;
            }
        }

        .controls-note {
            text-align: center;
            margin-top: 16px;
            font-size: 0.7rem;
            color: #b9d8c9;
            background: #0a2823;
            display: inline-block;
            width: auto;
            padding: 4px 14px;
            border-radius: 50px;
            margin-left: auto;
            margin-right: auto;
        }

        footer {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 16px;
            color: #7aa89c;
        }

        .sound-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e3b36;
            border-radius: 40px;
            padding: 8px 14px;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 10px black;
            border: none;
            color: #ffd966;
        }

        @media (max-width: 550px) {
            .sound-toggle {
                bottom: 12px;
                right: 12px;
                padding: 6px 12px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <div class="game-panel">
            <div class="stats-panel">
                <div class="record-box">
                    <div class="record-label">🏆 ЛУЧШИЙ РЕКОРД</div>
                    <div class="record-value" id="bestRecordDisplay">—</div>
                </div>
                <div class="record-box">
                    <div class="record-label">⚡ ПОСЛЕДНИЙ РЕЗУЛЬТАТ</div>
                    <div class="record-value" id="lastRecordDisplay">—</div>
                </div>
            </div>

            <div class="canvas-container">
                <canvas id="labyrinthCanvas" width="500" height="500"></canvas>
            </div>

            <div class="info-bar">
                <div class="timer-box">
                    <span>⏱️ ВРЕМЯ</span>
                    <span class="timer-value" id="timerDisplay">0.00</span>
                </div>
                <div class="status-box">
                    <span>🏁 СТАТУС</span>
                    <span class="status-value" id="statusMsg">ЖДЁТ СТАРТ</span>
                </div>
                <button id="resetBtn">🔄 НОВАЯ ИГРА</button>
            </div>

            <div class="controls">
                <div class="dpad">
                    <div class="dpad-row">
                        <div class="arrow-btn" data-dir="up">▲</div>
                    </div>
                    <div class="dpad-row">
                        <div class="arrow-btn" data-dir="left">◀</div>
                        <div class="arrow-btn" data-dir="down">▼</div>
                        <div class="arrow-btn" data-dir="right">▶</div>
                    </div>
                </div>
            </div>
            <div class="controls-note">
                ★ Нажми на любую стрелку для старта • Рекорд сохраняется навсегда ★
            </div>
            <footer>★ Звуки: шаги, победа • Кнопка 🔊 справа внизу ★</footer>
        </div>
    </div>
</div>
<button id="soundToggleBtn" class="sound-toggle">🔊 ЗВУК ВКЛ</button>

<script>
    (function(){
        // ---------- ЗВУКИ через Web Audio API (ФИКС ДЛЯ GITHUB PAGES) ----------
        let audioCtx = null;
        let soundEnabled = true;
        let audioUnlocked = false;
        
        // Инициализация AudioContext (только при первом жесте пользователя)
        function initAudioOnUserGesture() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                // Не вызываем resume сразу, ждем user gesture
            } catch(e) {
                console.warn("Web Audio API не поддерживается");
            }
        }
        
        // Функция для безопасного воспроизведения звука
        function playSound(frequency, duration, volume = 0.15, type = 'sine') {
            if (!soundEnabled) return;
            if (!audioCtx) return;
            
            // Пытаемся возобновить контекст если он приостановлен
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => {
                    actuallyPlaySound(frequency, duration, volume, type);
                }).catch(e => console.log("Audio resume failed:", e));
            } else if (audioCtx.state === 'running') {
                actuallyPlaySound(frequency, duration, volume, type);
            }
        }
        
        function actuallyPlaySound(frequency, duration, volume, type) {
            if (!audioCtx || !soundEnabled) return;
            try {
                const now = audioCtx.currentTime;
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = frequency;
                oscillator.type = type;
                gainNode.gain.setValueAtTime(volume, now);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration);
                oscillator.start();
                oscillator.stop(now + duration);
            } catch(e) {
                console.warn("Sound play error:", e);
            }
        }
        
        // Звук шага
        function playStepSound() {
            playSound(850, 0.07, 0.1, 'triangle');
        }
        
        // Звук победы (простая последовательность)
        function playVictorySound() {
            if (!soundEnabled) return;
            const notes = [523.25, 659.25, 783.99, 1046.50];
            notes.forEach((freq, idx) => {
                setTimeout(() => {
                    playSound(freq, 0.35, 0.2, 'sine');
                }, idx * 130);
            });
            setTimeout(() => {
                playSound(880, 0.5, 0.18, 'sine');
            }, 520);
        }
        
        // Звук старта
        function playStartSound() {
            playSound(1200, 0.1, 0.12, 'sine');
        }
        
        // Разблокировка аудио по первому действию пользователя
        function unlockAudioOnFirstInteraction() {
            if (audioUnlocked) return;
            if (!audioCtx) {
                initAudioOnUserGesture();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => {
                    audioUnlocked = true;
                    console.log("Audio unlocked!");
                }).catch(e => console.log("Resume failed:", e));
            } else if (audioCtx && audioCtx.state === 'running') {
                audioUnlocked = true;
            } else if (!audioCtx) {
                initAudioOnUserGesture();
                if (audioCtx) audioCtx.resume().then(() => audioUnlocked = true);
            }
        }
        
        // Привязываем разблокировку к любым действиям пользователя
        const interactionEvents = ['click', 'touchstart', 'keydown'];
        interactionEvents.forEach(ev => {
            window.addEventListener(ev, unlockAudioOnFirstInteraction, { once: false, passive: false });
        });
        
        // ---------- КОНСТАНТЫ ИГРЫ ----------
        const SIZE = 13;
        const STORAGE_BEST_KEY = 'labyrinth_best_time';
        const STORAGE_LAST_KEY = 'labyrinth_last_time';
        
        let canvas = document.getElementById('labyrinthCanvas');
        let ctx = canvas.getContext('2d');
        canvas.width = 500;
        canvas.height = 500;
        
        let maze = [];
        let player = { x: 1, y: 1 };
        let exitPos = { x: SIZE-2, y: SIZE-2 };
        let gameActive = true;
        let gameFinished = false;
        
        let timerStarted = false;
        let startTime = null;
        let timerInterval = null;
        
        let bestTime = null;
        let lastTime = null;
        
        const bestRecordSpan = document.getElementById('bestRecordDisplay');
        const lastRecordSpan = document.getElementById('lastRecordDisplay');
        
        // ---------- РЕКОРДЫ ----------
        function loadRecords() {
            try {
                const savedBest = localStorage.getItem(STORAGE_BEST_KEY);
                if(savedBest !== null && !isNaN(parseFloat(savedBest))) {
                    bestTime = parseFloat(savedBest);
                    bestRecordSpan.innerText = bestTime.toFixed(2) + " сек";
                } else {
                    bestTime = null;
                    bestRecordSpan.innerText = "—";
                }
                const savedLast = localStorage.getItem(STORAGE_LAST_KEY);
                if(savedLast !== null && !isNaN(parseFloat(savedLast))) {
                    lastTime = parseFloat(savedLast);
                    lastRecordSpan.innerText = lastTime.toFixed(2) + " сек";
                } else {
                    lastTime = null;
                    lastRecordSpan.innerText = "—";
                }
            } catch(e) { console.warn("localStorage error"); }
        }
        
        function saveNewRecord(seconds) {
            if(isNaN(seconds) || seconds <= 0) return false;
            lastTime = seconds;
            try {
                localStorage.setItem(STORAGE_LAST_KEY, lastTime.toFixed(3));
            } catch(e) {}
            lastRecordSpan.innerText = lastTime.toFixed(2) + " сек";
            let isNewBest = false;
            if(bestTime === null || seconds < bestTime) {
                bestTime = seconds;
                try {
                    localStorage.setItem(STORAGE_BEST_KEY, bestTime.toFixed(3));
                } catch(e) {}
                bestRecordSpan.innerText = bestTime.toFixed(2) + " сек";
                isNewBest = true;
            } else {
                bestRecordSpan.innerText = bestTime.toFixed(2) + " сек";
            }
            return isNewBest;
        }
        
        // ---------- ГЕНЕРАЦИЯ ЛАБИРИНТА ----------
        function initEmptyMaze() {
            let grid = Array(SIZE).fill().map(() => Array(SIZE).fill(true));
            for(let i = 0; i < SIZE; i++){
                for(let j = 0; j < SIZE; j++){
                    if(i%2 === 1 && j%2 === 1) grid[i][j] = false;
                }
            }
            return grid;
        }
        
        function generateMazeDFS() {
            let grid = initEmptyMaze();
            let visited = Array(SIZE).fill().map(() => Array(SIZE).fill(false));
            let startCell = { x: 1, y: 1 };
            let stack = [];
            visited[startCell.y][startCell.x] = true;
            stack.push(startCell);
            while(stack.length > 0) {
                let current = stack[stack.length-1];
                let neighbors = [];
                const dirs = [[0, -2], [0, 2], [-2, 0], [2, 0]];
                for(let [dx, dy] of dirs){
                    let nx = current.x + dx;
                    let ny = current.y + dy;
                    if(nx > 0 && nx < SIZE-1 && ny > 0 && ny < SIZE-1 && !visited[ny][nx]){
                        neighbors.push({x: nx, y: ny, dx: dx/2, dy: dy/2});
                    }
                }
                if(neighbors.length > 0){
                    let chosen = neighbors[Math.floor(Math.random() * neighbors.length)];
                    let wallX = current.x + chosen.dx;
                    let wallY = current.y + chosen.dy;
                    grid[wallY][wallX] = false;
                    grid[chosen.y][chosen.x] = false;
                    visited[chosen.y][chosen.x] = true;
                    stack.push({x: chosen.x, y: chosen.y});
                } else {
                    stack.pop();
                }
            }
            grid[1][1] = false;
            grid[SIZE-2][SIZE-2] = false;
            return grid;
        }
        
        function isReachable(mazeGrid, start, exit) {
            let queue = [{x: start.x, y: start.y}];
            let visited = Array(SIZE).fill().map(()=>Array(SIZE).fill(false));
            visited[start.y][start.x] = true;
            while(queue.length){
                let {x, y} = queue.shift();
                if(x === exit.x && y === exit.y) return true;
                let dirs = [[1,0],[-1,0],[0,1],[0,-1]];
                for(let [dx, dy] of dirs){
                    let nx = x+dx, ny = y+dy;
                    if(nx>=0 && ny>=0 && nx<SIZE && ny<SIZE && !mazeGrid[ny][nx] && !visited[ny][nx]){
                        visited[ny][nx]=true;
                        queue.push({x:nx, y:ny});
                    }
                }
            }
            return false;
        }
        
        function generateValidMaze() {
            let maxAttempts = 15;
            for(let attempt = 0; attempt < maxAttempts; attempt++) {
                let newMaze = generateMazeDFS();
                if(!newMaze[1][1]) newMaze[1][1] = false;
                if(!newMaze[SIZE-2][SIZE-2]) newMaze[SIZE-2][SIZE-2] = false;
                let startPoint = {x:1, y:1};
                let exitPoint = {x:SIZE-2, y:SIZE-2};
                if(isReachable(newMaze, startPoint, exitPoint)) {
                    newMaze[exitPoint.y][exitPoint.x] = false;
                    return newMaze;
                }
            }
            let fallback = initEmptyMaze();
            for(let i=0;i<SIZE;i++) for(let j=0;j<SIZE;j++) fallback[i][j] = false;
            for(let i=0;i<SIZE;i++) fallback[0][i]=true; fallback[1][0]=false;
            for(let i=0;i<SIZE;i++) fallback[SIZE-1][i]=true;
            for(let i=0;i<SIZE;i++) fallback[i][0]=true; fallback[i][SIZE-1]=true;
            fallback[1][1]=false;
            fallback[SIZE-2][SIZE-2]=false;
            for(let i=1;i<SIZE-1;i++) fallback[1][i]=false;
            for(let i=1;i<SIZE-1;i++) fallback[SIZE-2][i]=false;
            for(let i=1;i<SIZE-1;i++) fallback[i][1]=false;
            for(let i=1;i<SIZE-1;i++) fallback[i][SIZE-2]=false;
            return fallback;
        }
        
        // ---------- ОТРИСОВКА ----------
        function drawMaze() {
            const cellSize = 500 / SIZE;
            ctx.clearRect(0, 0, 500, 500);
            for(let row = 0; row < SIZE; row++) {
                for(let col = 0; col < SIZE; col++) {
                    let x = col * cellSize;
                    let y = row * cellSize;
                    if(maze[row][col] === true) {
                        ctx.fillStyle = "#2c4a3b";
                        ctx.fillRect(x, y, cellSize-0.5, cellSize-0.5);
                        ctx.fillStyle = "#1d362b";
                        ctx.fillRect(x+1, y+1, cellSize-2.5, cellSize-2.5);
                        ctx.fillStyle = "#4f6b5a";
                        ctx.fillRect(x+3, y+2, cellSize-6, cellSize-6);
                    } else {
                        let grad = ctx.createLinearGradient(x, y, x+cellSize, y+cellSize);
                        grad.addColorStop(0, "#ecd9b4");
                        grad.addColorStop(1, "#e1c699");
                        ctx.fillStyle = grad;
                        ctx.fillRect(x, y, cellSize-0.5, cellSize-0.5);
                        ctx.fillStyle = "#ccaa77";
                        ctx.fillRect(x+1, y+1, cellSize-2.5, cellSize-2.5);
                    }
                }
            }
            let ex = exitPos.x * cellSize;
            let ey = exitPos.y * cellSize;
            ctx.save();
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#facf5a";
            ctx.beginPath();
            ctx.arc(ex + cellSize/2, ey + cellSize/2, cellSize*0.32, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#ffb347";
            ctx.beginPath();
            ctx.arc(ex + cellSize/2, ey + cellSize/2, cellSize*0.22, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#ffdd88";
            ctx.font = `bold ${Math.floor(cellSize * 0.55)}px monospace`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("★", ex + cellSize/2, ey + cellSize/2);
            
            let px = player.x * cellSize;
            let py = player.y * cellSize;
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#fcda5b";
            ctx.fillStyle = "#fff7c0";
            ctx.beginPath();
            ctx.arc(px + cellSize/2, py + cellSize/2, cellSize*0.3, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#f0a500";
            ctx.beginPath();
            ctx.arc(px + cellSize/2, py + cellSize/2, cellSize*0.18, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#222";
            ctx.font = `bold ${Math.floor(cellSize * 0.44)}px sans-serif`;
            ctx.fillText("⚡", px + cellSize/2, py + cellSize/2+1);
            ctx.shadowBlur = 0;
            ctx.strokeStyle = "#735e3a";
            ctx.lineWidth = 0.8;
            for(let i=0;i<=SIZE;i++){
                ctx.beginPath();
                ctx.moveTo(i*cellSize,0);
                ctx.lineTo(i*cellSize,500);
                ctx.stroke();
                ctx.moveTo(0,i*cellSize);
                ctx.lineTo(500,i*cellSize);
                ctx.stroke();
            }
        }
        
        // ---------- ТАЙМЕР ----------
        function stopTimerIfRunning() {
            if(timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        }
        
        function startTimerOnFirstMove() {
            if(timerStarted) return;
            timerStarted = true;
            startTime = performance.now();
            timerInterval = setInterval(() => {
                if(!gameActive || gameFinished) return;
                let elapsed = (performance.now() - startTime) / 1000;
                document.getElementById('timerDisplay').innerText = elapsed.toFixed(2);
            }, 50);
        }
        
        // ---------- ПОБЕДА ----------
        function declareVictory() {
            if(!gameActive) return;
            gameActive = false;
            gameFinished = true;
            stopTimerIfRunning();
            let finalTime = 0;
            if(timerStarted && startTime) {
                finalTime = (performance.now() - startTime) / 1000;
                document.getElementById('timerDisplay').innerText = finalTime.toFixed(2);
            }
            document.getElementById('statusMsg').innerHTML = "ПОБЕДА!";
            playVictorySound();
            if(finalTime > 0) {
                const isNewBest = saveNewRecord(finalTime);
                drawMaze();
                ctx.fillStyle = "#ffe6b3cc";
                ctx.fillRect(0,0,500,500);
                drawMaze();
                ctx.font = "bold 26px monospace";
                ctx.fillStyle = "#2b411c";
                ctx.fillText("✧ ВЫБРАЛСЯ! ✧", 135, 240);
                ctx.font = "18px monospace";
                ctx.fillStyle = "#5a3e1a";
                ctx.fillText(`Время: ${finalTime.toFixed(2)} сек`, 170, 300);
                if(isNewBest) {
                    ctx.font = "bold 16px monospace";
                    ctx.fillStyle = "#c98600";
                    ctx.fillText("НОВЫЙ РЕКОРД! 🏆", 175, 350);
                }
            } else {
                drawMaze();
                ctx.fillStyle = "#ffe6b3cc";
                ctx.fillRect(0,0,500,500);
                drawMaze();
                ctx.font = "bold 22px monospace";
                ctx.fillText("ПОБЕДА!", 200, 260);
            }
        }
        
        function checkVictoryAfterMove() {
            if(player.x === exitPos.x && player.y === exitPos.y && gameActive && !gameFinished) {
                declareVictory();
                return true;
            }
            return false;
        }
        
        // ---------- ДВИЖЕНИЕ ----------
        function tryMove(dx, dy) {
            if(!gameActive || gameFinished) return false;
            let newX = player.x + dx;
            let newY = player.y + dy;
            if(newX < 0 || newX >= SIZE || newY < 0 || newY >= SIZE) return false;
            if(maze[newY][newX] === true) return false;
            
            if(!timerStarted && !gameFinished && gameActive) {
                startTimerOnFirstMove();
                playStartSound();
                document.getElementById('statusMsg').innerHTML = "В ПУТИ";
            } else if(timerStarted) {
                playStepSound();
            }
            
            player.x = newX;
            player.y = newY;
            drawMaze();
            checkVictoryAfterMove();
            return true;
        }
        
        // ---------- НОВАЯ ИГРА ----------
        function newGame() {
            stopTimerIfRunning();
            gameActive = true;
            gameFinished = false;
            timerStarted = false;
            startTime = null;
            maze = generateValidMaze();
            player = { x: 1, y: 1 };
            exitPos = { x: SIZE-2, y: SIZE-2 };
            maze[player.y][player.x] = false;
            maze[exitPos.y][exitPos.x] = false;
            if(!isReachable(maze, {x:player.x, y:player.y}, {x:exitPos.x, y:exitPos.y})) {
                for(let i=1;i<SIZE-1;i++) maze[1][i]=false;
                for(let i=1;i<SIZE-1;i++) maze[SIZE-2][i]=false;
                maze[exitPos.y][exitPos.x]=false;
            }
            drawMaze();
            document.getElementById('statusMsg').innerHTML = "ЖДЁТ СТАРТ";
            document.getElementById('timerDisplay').innerText = "0.00";
        }
        
        // ---------- УПРАВЛЕНИЕ ----------
        function handleKey(e) {
            if(!gameActive || gameFinished) return;
            let moved = false;
            if(e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') moved = tryMove(0, -1);
            else if(e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') moved = tryMove(0, 1);
            else if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') moved = tryMove(-1, 0);
            else if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') moved = tryMove(1, 0);
            if(moved) e.preventDefault();
        }
        
        function setupUIButtons() {
            const btns = document.querySelectorAll('.arrow-btn');
            btns.forEach(btn => {
                const handler = (e) => {
                    e.preventDefault();
                    if(!gameActive || gameFinished) return;
                    let dir = btn.getAttribute('data-dir');
                    if(dir === 'up') tryMove(0, -1);
                    else if(dir === 'down') tryMove(0, 1);
                    else if(dir === 'left') tryMove(-1, 0);
                    else if(dir === 'right') tryMove(1, 0);
                };
                btn.addEventListener('click', handler);
                btn.addEventListener('touchstart', handler, { passive: false });
            });
            document.getElementById('resetBtn').addEventListener('click', () => { newGame(); });
        }
        
        // ---------- ЗВУК ВКЛ/ВЫКЛ ----------
        const soundToggleBtn = document.getElementById('soundToggleBtn');
        function toggleSound() {
            soundEnabled = !soundEnabled;
            soundToggleBtn.innerText = soundEnabled ? "🔊 ЗВУК ВКЛ" : "🔇 ЗВУК ВЫКЛ";
        }
        soundToggleBtn.addEventListener('click', toggleSound);
        
        // ---------- ИНИТ ----------
        function init() {
            loadRecords();
            setupUIButtons();
            newGame();
            window.addEventListener('resize', () => drawMaze());
            setTimeout(() => drawMaze(), 50);
            // Инициализируем аудио контекст, но не запускаем до жеста
            initAudioOnUserGesture();
        }
        
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); });
        window.addEventListener('keydown', handleKey);
        init();
    })();
</script>
</body>
</html>
